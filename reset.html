<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password — ImmunoVerse Portal</title>
<meta name="description" content="Reset or set your ImmunoVerse portal password." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  (function () {
    try {
      var saved = localStorage.getItem('iv.theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (e) {}
  })();
  function toggleTheme() {
    var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    var next = cur === 'light' ? 'dark' : 'light';
    if (next === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('iv.theme', next); } catch (e) {}
  }
</script>
<style>
:root {
  --bg-0: #05070e; --bg-1: #0a0e1a; --bg-2: #0f1424; --bg-3: #151b2e;
  --bg-card: rgba(20, 26, 45, 0.72);
  --border: rgba(120, 150, 220, 0.14); --border-2: rgba(120, 150, 220, 0.28);
  --text-0: #f2f5ff; --text-1: #c8cfe4; --text-2: #8a93ad; --text-3: #5a6380;
  --accent-cyan: #22d3ee; --accent-violet: #a78bfa;
  --primary: #818cf8; --primary-strong: #4953bc; --primary-soft: rgba(129,140,248,0.18);
  --link: #22d3ee; --danger: #f87171; --success: #86efac;
  --grad-primary: linear-gradient(135deg, #22d3ee 0%, #818cf8 45%, #c084fc 100%);
  --grad-hero: radial-gradient(900px 600px at 25% 15%, rgba(34,211,238,0.18), transparent 60%),
               radial-gradient(900px 600px at 85% 25%, rgba(167,139,250,0.22), transparent 60%);
  --shadow-lg: 0 20px 60px rgba(5,8,20,0.55), 0 2px 8px rgba(5,8,20,0.4);
  --radius: 14px; --radius-lg: 22px; --radius-pill: 9999px;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
:root[data-theme="light"] {
  --bg-0: #f7f9fb; --bg-1: #ffffff; --bg-2: #f0f3fa; --bg-3: #e7ecf6;
  --bg-card: rgba(255, 255, 255, 0.95);
  --border: rgba(60, 80, 140, 0.14); --border-2: rgba(60, 80, 140, 0.28);
  --text-0: #0b1220; --text-1: #1f2a44; --text-2: #4a5570; --text-3: #8893ad;
  --shadow-lg: 0 20px 50px rgba(40,60,120,0.12), 0 2px 8px rgba(40,60,120,0.08);
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-0); color: var(--text-0);
  min-height: 100vh; display: grid; place-items: center; padding: 24px;
}
.bg-hero { position: fixed; inset: 0; background: var(--grad-hero); z-index: 0; pointer-events: none; }
.card {
  position: relative; z-index: 1; width: 100%; max-width: 440px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow-lg);
  backdrop-filter: blur(12px);
}
.brand {
  display: inline-block; padding: 7px 13px; border-radius: var(--radius-pill);
  background: var(--grad-primary); color: #05070e; font-size: 11px;
  font-weight: 800; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 22px;
}
h1 { font-size: 24px; margin: 0 0 8px; }
.sub { color: var(--text-2); font-size: 14px; line-height: 1.55; margin: 0 0 24px; }
.field { margin-bottom: 16px; }
.label { display: block; font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 7px; }
.input-row { position: relative; display: flex; align-items: center; }
.input {
  width: 100%; padding: 12px 14px; border-radius: var(--radius);
  background: var(--bg-2); border: 1px solid var(--border-2); color: var(--text-0);
  font-size: 14px; font-family: inherit; caret-color: var(--accent-cyan);
}
.input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
.toggle-pwd {
  position: absolute; right: 8px; background: none; border: none; cursor: pointer;
  font-size: 16px; opacity: .6; padding: 4px;
}
.submit-btn {
  width: 100%; padding: 13px; border: none; border-radius: var(--radius);
  background: var(--grad-primary); color: #05070e; font-weight: 700; font-size: 15px;
  cursor: pointer; margin-top: 8px;
}
.submit-btn[disabled] { opacity: .6; cursor: not-allowed; }
.alert {
  padding: 12px 14px; border-radius: var(--radius); font-size: 13.5px;
  margin-bottom: 18px; line-height: 1.5;
}
.alert-error { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.4); color: var(--danger); }
.alert-success { background: rgba(134,239,172,.1); border: 1px solid rgba(134,239,172,.35); color: var(--success); }
.hidden { display: none; }
.muted-link { color: var(--link); text-decoration: none; font-size: 13.5px; }
.muted-link:hover { text-decoration: underline; }
.foot { text-align: center; margin-top: 20px; }
.theme-fab {
  position: fixed; top: 18px; right: 18px; z-index: 2; width: 40px; height: 40px;
  border-radius: 50%; border: 1px solid var(--border-2); background: var(--bg-2);
  color: var(--text-1); cursor: pointer; font-size: 16px;
}
.hint { color: var(--text-3); font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div class="bg-hero"></div>
<button class="theme-fab" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">◐</button>

<div class="card">
  <span class="brand">ImmunoVerse Portal</span>

  <div id="alert" class="alert hidden" role="alert"></div>

  <!-- Step 1: request a reset (no token in URL) -->
  <form id="requestForm" onsubmit="return handleRequest(event)">
    <h1>Reset your password</h1>
    <p class="sub">Enter the email associated with your account and we'll send you a link to set a new password.</p>
    <div class="field">
      <label class="label" for="rq-email">Email</label>
      <input id="rq-email" class="input" type="email" autocomplete="email" placeholder="you@institute.edu" required />
    </div>
    <button id="requestSubmit" type="submit" class="submit-btn">Send reset link</button>
    <p class="foot"><a class="muted-link" href="login.html">← Back to sign in</a></p>
  </form>

  <!-- Step 2: set a new password (token present in URL) -->
  <form id="setForm" class="hidden" onsubmit="return handleSet(event)">
    <h1 id="setTitle">Set a new password</h1>
    <p class="sub" id="setSub">Choose a new password for your account.</p>
    <div class="field">
      <label class="label" for="np-password">New password</label>
      <div class="input-row">
        <input id="np-password" class="input" type="password" autocomplete="new-password" placeholder="At least 8 characters" minlength="8" required />
        <button type="button" class="toggle-pwd" onclick="togglePwd('np-password')" aria-label="Show password">👁</button>
      </div>
    </div>
    <div class="field">
      <label class="label" for="np-confirm">Confirm new password</label>
      <div class="input-row">
        <input id="np-confirm" class="input" type="password" autocomplete="new-password" placeholder="Re-enter" minlength="8" required />
        <button type="button" class="toggle-pwd" onclick="togglePwd('np-confirm')" aria-label="Show password">👁</button>
      </div>
    </div>
    <button id="setSubmit" type="submit" class="submit-btn">Set password</button>
    <p class="foot"><a class="muted-link" href="login.html">← Back to sign in</a></p>
  </form>
</div>

<script>
// Dev override (localhost-only) — see login.html for the rationale.
(function () {
  try {
    var qp = new URLSearchParams(location.search).get('authbase');
    if (qp === 'clear') { localStorage.removeItem('iv_dev_authbase'); }
    else if (qp && /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/.test(qp.replace(/\/+$/, ''))) {
      localStorage.setItem('iv_dev_authbase', qp.replace(/\/+$/, ''));
    }
    var dev = localStorage.getItem('iv_dev_authbase');
    if (dev) window.IMMUNOVERSE_AUTH_BASE = dev;
  } catch (e) {}
})();
// Auth endpoint fallback chain: portal's own domain first (auth.immuno-verse.com),
// chat domain as fallback. A localhost dev override above wins outright.
const IV_AUTH_BASES = (
  window.IMMUNOVERSE_AUTH_BASES ? window.IMMUNOVERSE_AUTH_BASES :
  window.IMMUNOVERSE_AUTH_BASE ? [window.IMMUNOVERSE_AUTH_BASE] :
  ['https://auth.immuno-verse.com', 'https://auth.immunoverse-chat.com']
).map(s => String(s).replace(/\/+$/, ''));
const AUTH = IV_AUTH_BASES[0];
let _ivAuthBase = null;
try { _ivAuthBase = sessionStorage.getItem('iv_auth_base'); } catch (e) {}
if (_ivAuthBase && IV_AUTH_BASES.indexOf(_ivAuthBase) === -1) _ivAuthBase = null;
async function ivAuthFetch(path, opts) {
  const ordered = _ivAuthBase
    ? [_ivAuthBase].concat(IV_AUTH_BASES.filter(b => b !== _ivAuthBase))
    : IV_AUTH_BASES.slice();
  let lastErr;
  for (let i = 0; i < ordered.length; i++) {
    try {
      const res = await fetch(ordered[i] + path, opts);
      _ivAuthBase = ordered[i];
      try { sessionStorage.setItem('iv_auth_base', ordered[i]); } catch (e) {}
      return res;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('auth endpoints unreachable');
}
const TOKEN = (new URLSearchParams(location.search)).get('token') || '';

function $(id) { return document.getElementById(id); }
function showAlert(msg, kind) {
  const el = $('alert');
  el.textContent = msg;
  el.className = 'alert alert-' + (kind || 'error');
  el.classList.remove('hidden');
}
function hideAlert() { $('alert').classList.add('hidden'); }
function setLoading(btnId, label) {
  const b = $(btnId); if (!b) return;
  b.disabled = true; b.dataset.orig = b.textContent; b.textContent = label;
}
function clearLoading(btnId) {
  const b = $(btnId); if (!b) return;
  b.disabled = false; if (b.dataset.orig) { b.textContent = b.dataset.orig; delete b.dataset.orig; }
}
function togglePwd(id) {
  const el = $(id); if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
}

// Decide which form to show based on whether a token is in the URL.
if (TOKEN) {
  $('requestForm').classList.add('hidden');
  $('setForm').classList.remove('hidden');
}

async function handleRequest(ev) {
  ev.preventDefault();
  hideAlert();
  setLoading('requestSubmit', 'Sending…');
  try {
    const res = await ivAuthFetch('/api/portal/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: $('rq-email').value.trim() }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showAlert(data.detail || 'Could not send reset link.', 'error');
      clearLoading('requestSubmit');
      return false;
    }
    // Always a generic message (no email enumeration).
    showAlert(data.message || 'If that email has an account, a reset link has been sent.', 'success');
    $('requestForm').classList.add('hidden');
  } catch (err) {
    showAlert('Network error: ' + err.message, 'error');
    clearLoading('requestSubmit');
  }
  return false;
}

async function handleSet(ev) {
  ev.preventDefault();
  hideAlert();
  if ($('np-password').value !== $('np-confirm').value) {
    showAlert('Passwords do not match.', 'error');
    return false;
  }
  setLoading('setSubmit', 'Saving…');
  try {
    const res = await ivAuthFetch('/api/portal/auth/reset-password/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: TOKEN,
        new_password: $('np-password').value,
        confirm_new_password: $('np-confirm').value,
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showAlert(data.detail || 'Could not set password. The link may have expired — request a new one.', 'error');
      clearLoading('setSubmit');
      return false;
    }
    $('setForm').classList.add('hidden');
    showAlert((data.message || 'Password set.') + ' Redirecting to sign in…', 'success');
    setTimeout(() => { location.href = 'login.html'; }, 1800);
  } catch (err) {
    showAlert('Network error: ' + err.message, 'error');
    clearLoading('setSubmit');
  }
  return false;
}
</script>
</body>
</html>
